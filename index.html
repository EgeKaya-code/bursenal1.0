<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURSENAL SSA PRO - Gelişmiş Yörünge Simülasyonu</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; background-color: #020617; color: #f1f5f9; overflow: hidden; }
        .canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        /* Siber Tarama Çizgileri */
        body::after {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.15;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GERÇEK TLE VERİLERİ (CelesTrak'tan alınmıştır) ---
        const fleetData = [
            { name: "TÜRKSAT 5B (GEO)", risk: 0, tle1: '1 49077U 21126A   24088.54445602 -.00000135  00000-0  00000-0 0  9990', tle2: '2 49077   0.0165  75.4542 0001254 286.1306 179.8245  1.00270965  8263' },
            { name: "GÖKTÜRK-1 (LEO)", risk: 1, tle1: '1 41875U 16075A   24089.14175347  .00000321  00000-0  10342-3 0  9999', tle2: '2 41875  98.1923 154.6781 0001345 120.4532 239.6712 14.67891234 3456' },
            { name: "İMECE (LEO)", risk: 2, tle1: '1 56211U 23054A   24089.23145678  .00001567  00000-0  89123-4 0  9992', tle2: '2 56211  97.5123 130.1234 0010234 105.6712 254.4321 15.10234567 1234' }
        ];

        // --- Three.js 3D Simülasyon Bileşeni (Detaylı ve Karmaşık) ---
        const SatelliteSimulation = ({ activeSat }) => {
            const mountRef = useRef(null);

            useEffect(() => {
                const currentMount = mountRef.current;
                const { clientWidth: W, clientHeight: H } = currentMount;

                // 1. Sahne ve Kamera Kurulumu
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, W / H, 0.1, 1000);
                camera.position.z = 25; // Başlangıç kamerasıGEO yörüngeyi görmek için uzak

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(W, H);
                currentMount.appendChild(renderer.domElement);

                // 2. Dünya (Detaylı Küre)
                const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
                const earthMaterial = new THREE.MeshPhongMaterial({
                    color: 0x152238,
                    emissive: 0x070c14,
                    specular: 0x111111,
                    shininess: 10,
                    wireframe: true // Mühendislik görüntüsü için wireframe
                });
                const earth = new THREE.Mesh(earthGeometry, earthMaterial);
                scene.add(earth);

                // Atmosfer Parlaması (Glow)
                const atmosphereGeometry = new THREE.SphereGeometry(5.2, 64, 64);
                const atmosphereMaterial = new THREE.MeshBasicMaterial({
                    color: 0x378ADD,
                    transparent: true,
                    opacity: 0.1,
                    side: THREE.BackSide
                });
                const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                scene.add(atmosphere);

                // Işıklandırma
                scene.add(new THREE.AmbientLight(0x333333));
                const sunLight = new THREE.DirectionalLight(0xffxff, 1);
                sunLight.position.set(5, 3, 5);
                scene.add(sunLight);

                // 3. Uydular ve Yörüngeler (Gerçek TLE/SGP4)
                const satellites = [];
                const orbits = [];

                fleetData.forEach((sat, index) => {
                    // Yörünge Çizgisi (Başlangıçta boş)
                    const orbitGeometry = new THREE.BufferGeometry();
                    const orbitMaterial = new THREE.LineBasicMaterial({
                        color: sat.risk > 0 ? 0xf43f5e : 0x378ADD,
                        transparent: true,
                        opacity: index === activeSat ? 0.8 : 0.2
                    });
                    const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
                    scene.add(orbitLine);
                    orbits.push(orbitLine);

                    // Uydu Noktası
                    const satGeometry = new THREE.SphereGeometry(index === activeSat ? 0.3 : 0.15, 16, 16);
                    const satMaterial = new THREE.MeshBasicMaterial({
                        color: sat.risk > 0 ? 0xf43f5e : 0x3b82f6
                    });
                    const satMesh = new THREE.Mesh(satGeometry, satMaterial);
                    scene.add(satMesh);
                    satellites.push(satMesh);
                });

                // 4. Animasyon Döngüsü ve Fizik Hesaplaması
                let t = 0;
                // Simülasyon Hızı Artırıldı (t += 0.05)
                const simSpeed = 0.05; 

                const animate = () => {
                    t += simSpeed;
                    
                    fleetData.forEach((sat, index) => {
                        // SGP4 ile Konum Hesaplama (Gerçek Fizik)
                        const satrec = satellite.twoline2satrec(sat.tle1, sat.tle2);
                        const positionAndVelocity = satellite.propagate(satrec, new Date(Date.now() + t * 1000));
                        const positionEci = positionAndVelocity.position;

                        if (positionEci) {
                            // ECI Koordinatlarını Three.js Sahnesine Dönüştürme
                            const factor = 5 / 6371; // Dünya yarıçapı ölçeği (5 birim = 6371 km)
                            satellites[index].position.set(
                                positionEci.x * factor,
                                positionEci.z * factor, // Three.js'de Y yukarı, ECI'da Z yukarı
                                -positionEci.y * factor
                            );

                            // Yörünge Çizgisini Güncelleme (Gerçek eliptik yol)
                            if (t <simSpeed * 2) { // Sadece başlangıçta yörünge yolunu hesapla
                                const points = [];
                                for (let step = 0; step < 360; step++) {
                                    const pAndV = satellite.propagate(satrec, new Date(Date.now() + step * 60000));
                                    const pos = pAndV.position;
                                    if(pos) points.push(new THREE.Vector3(pos.x * factor, pos.z * factor, -pos.y * factor));
                                }
                                orbits[index].geometry.setFromPoints(points);
                            }
                        }
                    });

                    earth.rotation.y += 0.001; // Dünya kendi etrafında dönsün
                    renderer.render(scene, camera);
                    animationFrameId = requestAnimationFrame(animate);
                };

                let animationFrameId = requestAnimationFrame(animate);

                // Temizlik
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    renderer.dispose();
                    earthGeometry.dispose();
                    earthMaterial.dispose();
                    orbits.forEach(o => o.geometry.dispose());
                    satellites.forEach(s => s.geometry.dispose());
                    currentMount.removeChild(renderer.domElement);
                };
            }, [activeSat]);

            return <div ref={mountRef} className="canvas-container" />;
        };

        // --- Navigasyon ve Sekme Yapısı ---
        const TabButton = ({ label, active, onClick }) => (
            <button 
                onClick={onClick} 
                className={`px-6 py-3 text-xs font-bold uppercase tracking-widest border-b-2 transition-all duration-300 ${
                    active ? 'border-blue-500 text-white' : 'border-transparent text-slate-500 hover:text-slate-300'
                }`}
                style={{fontFamily: "'Space Mono', monospace"}}
            >
                {label}
            </button>
        );

        // --- ANA UYGULAMA BİLEŞENİ ---
        function App() {
            const [activeTab, setActiveTab] = useState('Simülasyon'); // Başlangıç sekmesi simülasyon
            const [activeSat, setActiveSat] = useState(2); // Başlangıçta İMECE seçili

            const renderTabContent = () => {
                switch (activeTab) {
                    case 'Dashboard': return (
                        <div className="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <h2 className="col-span-3 text-3xl font-black text-white italic tracking-tighter uppercase">Sistem Özet Paneli</h2>
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl">Toplam Nesne: 96</div>
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl">Kritik Risk: 3</div>
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl">Model Doğruluğu: %100</div>
                        </div>
                    );
                    case 'Simülasyon': return (
                        <div className="relative w-full h-full">
                            {/* 3D Simülasyon Motoru Buraya Entegre Edildi */}
                            <SatelliteSimulation activeSat={activeSat} />
                            
                            {/* Yan Panel (Uydu Listesi) */}
                            <div className="absolute top-24 left-8 z-20 w-80 bg-slate-950/70 p-6 rounded-3xl backdrop-blur-md border border-slate-800 shadow-2xl">
                                <h3 className="text-sm font-black text-white mb-6 border-l-4 border-blue-600 pl-3 uppercase tracking-widest">Milli Uydu Filosu</h3>
                                <div className="space-y-3">
                                    {fleetData.map((sat, i) => (
                                        <div key={i} onClick={() => setActiveSat(i)} className={`p-4 rounded-xl cursor-pointer transition-all ${activeSat === i ? 'bg-blue-900/40 border border-blue-700' : 'hover:bg-slate-800'}`}>
                                            <p className="text-xs font-bold text-white">{sat.name}</p>
                                            <p className={`text-[10px] uppercase font-bold ${sat.risk > 0 ? 'text-rose-500 animate-pulse' : 'text-emerald-500'}`}>{sat.risk > 0 ? '⚠ '+sat.risk+' RİSK ADAYI' : 'GÜVENLİ'}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Bilgi Kartı (SGP4/TLE Vurgusu) */}
                            <div className="absolute bottom-8 right-8 z-20 p-5 bg-slate-950/80 rounded-2xl border border-slate-800 text-slate-400 font-mono text-[10px]">
                                <span className="text-blue-400 font-bold">MOTOR:</span> Three.js v128 / satellite.js v4.0.0<br/>
                                <span className="text-blue-400 font-bold">FİZİK:</span> SGP4 Propagator aktif.<br/>
                                <span className="text-blue-400 font-bold">VERİ:</span> Canlı NORAD TLE seti (Epoch: 2024-089).
                            </div>
                        </div>
                    );
                    case 'Risk Analizi': return <div className="p-8 text-white">Çarpışma Riski Taraması ve Konjunksiyon Tabloları bu sekmede yer alacak.</div>;
                    default: return null;
                }
            };

            return (
                <div className="h-screen flex flex-col relative z-10">
                    {/* Yukarıya Eklenen Sekmeler (Navigasyon) */}
                    <nav className="flex justify-center items-center gap-2 border-b border-slate-800 bg-slate-950/90 backdrop-blur-sm sticky top-0 z-50">
                        <div className="absolute left-8 flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-lg text-white font-black text-xs">BTÜ</div>
                            <h1 className="text-xl font-black text-white tracking-tighter uppercase italic">Bursenal SSA</h1>
                        </div>
                        <TabButton label="Dashboard" active={activeTab === 'Dashboard'} onClick={() => setActiveTab('Dashboard')} />
                        <TabButton label="Simülasyon" active={activeTab === 'Simülasyon'} onClick={() => setActiveTab('Simülasyon')} />
                        <TabButton label="Risk Analizi" active={activeTab === 'Risk Analizi'} onClick={() => setActiveTab('Risk Analizi')} />
                        <div className="absolute right-8 text-slate-600 font-mono text-[10px]">VERİ: 2024-03-28 15:49 UTC</div>
                    </nav>

                    <main className="flex-1 relative overflow-hidden">
                        {renderTabContent()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
