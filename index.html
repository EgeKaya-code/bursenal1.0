<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURSENAL SSA - Yörünge Temizliği</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Syne', sans-serif; background-color: #030712; }
        
        /* Ege'nin Siber Arka Planı ve Tarama Çizgileri */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(55,138,221,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(55,138,221,0.04) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }
        
        body::after {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.3;
        }

        /* Scrollbar Gizleme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 selection:bg-blue-500/30">
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SvgIcon = ({ name }) => {
            const icons = {
                globe: <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zM12 4a15.89 15.89 0 0 1 4 8 15.89 15.89 0 0 1-4 8 15.89 15.89 0 0 1-4-8 15.89 15.89 0 0 1 4-8zM2.5 12h19" />,
                satellite: <path d="M13 7 9 3 5 7l4 4M17 11 4 4-4 4-4-4m7 12 5 5c1.5 1.5 3 1.5 4.5 0s1.5-3 0-4.5L12 7m0 10c.5.5 1 1 1.5 1m-2-6 .5.5m.5-.5.5.5m.5-.5.5.5m.5-.5.5.5" />,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" />,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            };
            return (
                <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const fleetData = [
            { name: "TÜRKSAT 4A", band: "GEO", risk: 0, status: "Güvenli" },
            { name: "TÜRKSAT 4B", band: "GEO", risk: 0, status: "Güvenli" },
            { name: "TÜRKSAT 5A", band: "GEO", risk: 0, status: "Güvenli" },
            { name: "TÜRKSAT 5B", band: "GEO", risk: 0, status: "Güvenli" },
            { name: "GÖKTÜRK-1", band: "LEO", risk: 1, status: "İzleniyor" },
            { name: "GÖKTÜRK-2", band: "LEO", risk: 2, status: "Tehlike" },
            { name: "RASAT", band: "LEO", risk: 0, status: "Güvenli" },
            { name: "İMECE", band: "LEO", risk: 2, status: "Tehlike" }
        ];

        const conjunctions = [
            { id: 1, target: "İMECE", threat: "DEBRIS (41231)", dist: "1.2 km", prob: "1.2e-4", tier: "Kırmızı" },
            { id: 2, target: "GÖKTÜRK-2", threat: "IRIDIUM 33 DEB", dist: "2.5 km", prob: "4.2e-5", tier: "Turuncu" },
            { id: 3, target: "GÖKTÜRK-1", threat: "CZ-4C DEB", dist: "8.1 km", prob: "2.1e-6", tier: "Sarı" }
        ];

        function App() {
            const [time, setTime] = useState(new Date());
            const [activeSat, setActiveSat] = useState(-1);
            const canvasRef = useRef(null);
            const activeSatRef = useRef(-1);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let t = 0;
                let W, H, cx, cy;
                let stars = [];

                const resize = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    W = rect.width; H = rect.height;
                    canvas.width = W; canvas.height = H;
                    cx = W / 2; cy = H / 2;
                    
                    stars = [];
                    for (let i = 0; i < 80; i++) {
                        stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5, o: Math.random() });
                    }
                };
                window.addEventListener('resize', resize);
                resize();

                const draw = () => {
                    ctx.clearRect(0, 0, W, H);
                    const earthR = Math.min(W, H) * 0.18;

                    stars.forEach(s => {
                        ctx.fillStyle = `rgba(232, 240, 248, ${s.o})`;
                        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                    });

                    const grd = ctx.createRadialGradient(cx, cy, earthR * 0.5, cx, cy, earthR * 1.5);
                    grd.addColorStop(0, 'rgba(55, 138, 221, 0.15)');
                    grd.addColorStop(1, 'transparent');
                    ctx.fillStyle = grd;
                    ctx.beginPath(); ctx.arc(cx, cy, earthR * 1.6, 0, Math.PI * 2); ctx.fill();

                    ctx.beginPath(); ctx.arc(cx, cy, earthR, 0, Math.PI * 2);
                    ctx.fillStyle = '#0d1e35'; ctx.fill();
                    ctx.strokeStyle = 'rgba(55, 138, 221, 0.5)'; ctx.lineWidth = 2; ctx.stroke();

                    const drawSatGroup = (band, radius, speedMultiplier) => {
                        const group = fleetData.filter(s => s.band === band);
                        group.forEach((s) => {
                            const i = group.indexOf(s);
                            const globalIndex = fleetData.indexOf(s);
                            const angle = (i / group.length) * Math.PI * 2 + t * speedMultiplier;
                            const z = Math.sin(angle);
                            const x = cx + Math.cos(angle) * radius;
                            const y = cy + z * (radius * 0.3);

                            const size = 4 + z * 2;
                            const alpha = 0.3 + (z + 1) * 0.4;
                            const isSelected = (globalIndex === activeSatRef.current);

                            ctx.globalAlpha = alpha;
                            ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2);
                            ctx.fillStyle = s.risk > 0 ? '#f43f5e' : (band === 'GEO' ? '#3b82f6' : '#10b981');
                            ctx.fill(); ctx.globalAlpha = 1;

                            if (isSelected) {
                                ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2;
                                ctx.beginPath(); ctx.arc(x, y, size + 10 + Math.sin(t * 5) * 4, 0, Math.PI * 2); ctx.stroke();
                                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y);
                                ctx.strokeStyle = 'rgba(55, 138, 221, 0.15)'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                            }
                        });
                    };

                    drawSatGroup('GEO', earthR * 3.0, 0.08);
                    drawSatGroup('LEO', earthR * 1.7, 0.55);

                    t += 0.007;
                    animationFrameId = requestAnimationFrame(draw);
                };

                draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
            }, []);

            const handleSatClick = (index) => {
                setActiveSat(index);
                activeSatRef.current = index;
            };

            const stats = [
                { label: "Toplam Nesne", value: "96", icon: "globe", color: "text-blue-400" },
                { label: "LEO (Alçak Yörünge)", value: "91", icon: "activity", color: "text-cyan-400" },
                { label: "GEO (Yer Sabit)", value: "5", icon: "satellite", color: "text-indigo-400" },
                { label: "Riskli Olaylar", value: "3", icon: "alert", color: "text-rose-500" }
            ];

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 border-b border-slate-800 pb-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-900/40 text-white">
                                <SvgIcon name="shield" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black text-white tracking-tighter uppercase italic" style={{fontFamily: "'Space Mono', monospace"}}>Bursenal SSA</h1>
                                <p className="text-slate-500 text-xs font-mono font-bold uppercase tracking-wider">
                                    {time.toISOString().replace('T', ' ').split('.')[0]} UTC • SİSTEM AKTİF
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button className="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold transition-all border border-slate-700 font-mono text-white">RAPOR AL</button>
                            <button className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-600/20 transition-all font-mono">VERİLERİ YENİLE</button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                {stats.map((stat, i) => (
                                    <div key={i} className="bg-slate-900/50 border border-slate-800 p-4 rounded-3xl hover:border-slate-700 transition-all group col-span-2 sm:col-span-1 lg:col-span-2">
                                        <div className="flex justify-between items-center mb-2">
                                            {/* BACKTICK HATASI DÜZELTİLDİ */}
                                            <span className={`p-2 rounded-xl bg-slate-950 ${stat.color}`}><SvgIcon name={stat.icon} /></span>
                                        </div>
                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">{stat.label}</p>
                                        <h2 className="text-3xl font-black text-white" style={{fontFamily: "'Space Mono', monospace"}}>{stat.value}</h2>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-slate-900/80 border border-slate-800 rounded-[2rem] p-6 shadow-2xl">
                                <h3 className="text-sm font-black text-white mb-6 border-l-4 border-blue-600 pl-3 uppercase tracking-widest">Milli Uydu Filosu</h3>
                                <div className="space-y-3">
                                    {fleetData.map((sat, i) => (
                                        <div key={i} onClick={() => handleSatClick(i)} className={`flex items-center gap-3 p-3 rounded-2xl transition-colors cursor-pointer group ${activeSat === i ? 'bg-blue-900/30 border border-blue-800/50' : 'hover:bg-slate-800/50 border border-transparent'}`}>
                                            {/* BACKTICK HATASI DÜZELTİLDİ */}
                                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${sat.risk > 0 ? 'bg-rose-500 animate-pulse' : 'bg-emerald-500'}`} />
                                            <div className="flex-1">
                                                <p className="text-xs font-bold text-white group-hover:text-blue-400 transition-colors">{sat.name}</p>
                                                <p className="text-[10px] text-slate-500 uppercase font-medium">{sat.band} • {sat.status}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-3 space-y-6">
                            <div className="bg-slate-900 border border-slate-800 rounded-[3rem] h-[500px] relative overflow-hidden shadow-2xl">
                                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full z-0"></canvas>
                                
                                <div className="absolute top-8 left-8 z-10 pointer-events-none">
                                    <h2 className="text-2xl font-black text-white uppercase tracking-tighter" style={{fontFamily: "'Space Mono', monospace"}}>Yörünge Analiz</h2>
                                    <p className="text-blue-400 text-xs font-bold uppercase tracking-widest mt-1">Gerçek Zamanlı SGP4 Simülasyonu</p>
                                </div>
                                
                                <div className="absolute bottom-8 right-8 z-10 flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-950/80 px-4 py-2 rounded-full backdrop-blur-sm border border-slate-800">
                                    <span className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full" /> GEO</span>
                                    <span className="flex items-center gap-2"><div className="w-2 h-2 bg-emerald-500 rounded-full" /> LEO</span>
                                    <span className="flex items-center gap-2"><div className="w-2 h-2 bg-rose-500 rounded-full animate-pulse" /> RİSK</span>
                                </div>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-2xl">
                                <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-xl">
                                    <h3 className="text-sm font-black text-white flex items-center gap-3 uppercase tracking-[0.2em]">
                                        <span className="text-rose-500"><SvgIcon name="alert" /></span>
                                        Çarpışma Riski Taraması
                                    </h3>
                                    <span className="bg-rose-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg shadow-rose-900/20 animate-pulse">3 KRİTİK OLAY</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-800/30 text-[10px] text-slate-500 font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="px-6 py-4">Hedef Varlık</th>
                                                <th className="px-6 py-4">Tehdit/Enkaz</th>
                                                <th className="px-6 py-4 text-center">Mesafe</th>
                                                <th className="px-6 py-4 text-center">Olasılık</th>
                                                <th className="px-6 py-4 text-right">Şiddet</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {conjunctions.map((item) => (
                                                <tr key={item.id} className="hover:bg-slate-800/40 transition-all group cursor-pointer">
                                                    <td className="px-6 py-5">
                                                        <span className="font-bold text-blue-400 group-hover:text-blue-300 transition-colors">{item.target}</span>
                                                    </td>
                                                    <td className="px-6 py-5 text-xs text-slate-400 font-mono">{item.threat}</td>
                                                    <td className="px-6 py-5 text-center text-xs text-white font-mono font-bold">{item.dist}</td>
                                                    <td className="px-6 py-5 text-center text-xs text-slate-500 font-mono">{item.prob}</td>
                                                    <td className="px-6 py-5 text-right">
                                                        <span className={`px-3 py-1 rounded text-[10px] font-black uppercase ${
                                                            item.tier === 'Kırmızı' ? 'bg-rose-600 text-white' : 
                                                            item.tier === 'Turuncu' ? 'bg-orange-500/20 text-orange-500' : 'bg-yellow-500/20 text-yellow-500'
                                                        }`}>{item.tier}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="max-w-7xl mx-auto mt-12 pt-8 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center text-slate-600 gap-4 mb-8">
                        <p className="text-[10px] font-bold uppercase tracking-[0.4em]">© 2026 BURSENAL SPACE DEFENSE SYSTEM</p>
                        <div className="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                            <span className="hover:text-blue-500 cursor-pointer transition-colors">DOKÜMANTASYON</span>
                            <span className="hover:text-blue-500 cursor-pointer transition-colors">API ERİŞİMİ</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
