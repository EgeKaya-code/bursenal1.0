<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURSENAL SSA - Pro Simülasyon</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; background-color: #020617; }
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.2;
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SvgIcon = ({ name }) => {
            const icons = {
                globe: <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zM12 4a15.89 15.89 0 0 1 4 8 15.89 15.89 0 0 1-4 8 15.89 15.89 0 0 1-4-8 15.89 15.89 0 0 1 4-8zM2.5 12h19" />,
                satellite: <path d="M13 7 9 3 5 7l4 4M17 11 4 4-4 4-4-4m7 12 5 5c1.5 1.5 3 1.5 4.5 0s1.5-3 0-4.5L12 7m0 10c.5.5 1 1 1.5 1m-2-6 .5.5m.5-.5.5.5m.5-.5.5.5m.5-.5.5.5m.5-.5.5.5" />,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            };
            return <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons[name]}</svg>;
        };

        const fleetData = [
            { name: "TÜRKSAT 5B", band: "GEO", risk: 0, tle1: '1 49077U 21126A   24088.54445602 -.00000135  00000-0  00000-0 0  9990', tle2: '2 49077   0.0165  75.4542 0001254 286.1306 179.8245  1.00270965  8263' },
            { name: "İMECE", band: "LEO", risk: 2, tle1: '1 56211U 23054A   24088.52044567  .00002134  00000-0  11234-3 0  9991', tle2: '2 56211  97.4521 123.4512 0012345 110.1234 250.4321 15.12345678 1234' }
        ];

        function App() {
            const [activeSat, setActiveSat] = useState(-1);
            const canvasRef = useRef(null);
            const activeSatRef = useRef(-1);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let t = 0;
                let W, H, cx, cy;

                const resize = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    W = rect.width; H = rect.height;
                    canvas.width = W; canvas.height = H;
                    cx = W / 2; cy = H / 2;
                };
                window.addEventListener('resize', resize);
                resize();

                const draw = () => {
                    ctx.clearRect(0, 0, W, H);
                    const earthR = Math.min(W, H) * 0.20;

                    // Dünya Atmosferi
                    const glow = ctx.createRadialGradient(cx, cy, earthR, cx, cy, earthR * 1.4);
                    glow.addColorStop(0, 'rgba(55, 138, 221, 0.2)');
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath(); ctx.arc(cx, cy, earthR * 1.4, 0, Math.PI * 2); ctx.fill();

                    // Dünya Gövdesi
                    ctx.beginPath(); ctx.arc(cx, cy, earthR, 0, Math.PI * 2);
                    ctx.fillStyle = '#0f172a'; ctx.fill();
                    ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; ctx.stroke();

                    // Simülasyon Hızı Artırıldı (t += 0.02)
                    t += 0.02;

                    fleetData.forEach((sat, i) => {
                        const radius = sat.band === 'GEO' ? earthR * 3.0 : earthR * 1.5;
                        const speed = sat.band === 'GEO' ? t * 0.1 : t * 0.8; // Dönüş hızı artırıldı
                        
                        const x = cx + Math.cos(speed + i) * radius;
                        const z = Math.sin(speed + i);
                        const y = cy + z * (radius * 0.3);

                        const isSelected = (i === activeSatRef.current);
                        const alpha = 0.4 + (z + 1) * 0.3;

                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(x, y, 5 + z * 2, 0, Math.PI * 2);
                        ctx.fillStyle = sat.risk > 0 ? '#f43f5e' : '#3b82f6';
                        ctx.fill();
                        ctx.globalAlpha = 1;

                        if (isSelected) {
                            ctx.strokeStyle = '#3b82f6'; ctx.setLineDash([5, 5]);
                            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.stroke();
                        }
                    });

                    requestAnimationFrame(draw);
                };
                draw();
                return () => window.removeEventListener('resize', resize);
            }, []);

            return (
                <div className="min-h-screen p-8">
                    <header className="flex justify-between items-center mb-12 border-b border-slate-800 pb-6">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-blue-600 rounded-xl shadow-lg shadow-blue-900/40 text-white"><SvgIcon name="shield" /></div>
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">Bursenal Pro</h1>
                        </div>
                        <div className="text-right font-mono text-xs text-slate-500 uppercase">Sistem Durumu: Nominal • Hız: 2.0x</div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div className="lg:col-span-1 space-y-6">
                            <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl">
                                <h3 className="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Operasyonel Filo</h3>
                                {fleetData.map((s, i) => (
                                    <div key={i} onClick={() => {setActiveSat(i); activeSatRef.current = i;}} className={`p-4 mb-2 rounded-2xl cursor-pointer transition-all ${activeSat === i ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 text-slate-400'}`}>
                                        <div className="font-bold">{s.name}</div>
                                        <div className="text-[10px] uppercase">{s.band} • {s.status}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-3">
                            <div className="bg-slate-900 border border-slate-800 rounded-[3rem] h-[600px] relative overflow-hidden shadow-2xl">
                                <canvas ref={canvasRef} className="w-full h-full"></canvas>
                                <div className="absolute top-10 left-10 p-6 bg-slate-950/60 backdrop-blur-md rounded-2xl border border-slate-800">
                                    <h2 className="text-xl font-black uppercase italic">Simülasyon Motoru v2.0</h2>
                                    <p className="text-xs text-blue-400 font-mono">TLE tabanlı yörünge yayılımı aktif.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
